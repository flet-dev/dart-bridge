name: Release

# Runs on tag push: builds all platform artifacts (reusing ci.yml steps via
# duplication for now — keep it self-contained so the release flow doesn't
# depend on workflow_run propagation) and attaches them to a GitHub Release.
#
# Tagging: vX.Y.Z (e.g. v1.0.0). Plain semver, decoupled from CPython
# version. abi3 means one binary per (platform × arch) covers all 3.12+.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake build-essential python3-dev
      - run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          mkdir -p dist
          cp build/libdart_bridge.so dist/libdart_bridge-linux-${{ matrix.arch }}.so
          file dist/libdart_bridge-linux-${{ matrix.arch }}.so
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*.so
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download python-windows-for-dart
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/flet-dev/python-build/releases/download/v3.12/python-windows-for-dart-3.12.zip" -OutFile pywin.zip
          Expand-Archive -Path pywin.zip -DestinationPath pywin -Force

      - name: Build Release + Debug variants
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          $includeDir = (Resolve-Path "pywin/include").Path
          $libDir = (Resolve-Path "pywin/libs").Path
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          # Release CRT
          $relCmd = "cl /nologo /LD /MD /DDART_SHARED_LIB /DPy_LIMITED_API=0x030c0000 /I `"$includeDir`" /I src src\dart_bridge.c src\dart_api\dart_api_dl.c /link /LIBPATH:`"$libDir`" /OUT:dist\dart_bridge-windows-x86_64.dll `"$libDir\python3.lib`""
          cmd /c "`"$vcvars`" >NUL && $relCmd"

          # Debug CRT
          $dbgCmd = "cl /nologo /LD /MDd /D_DEBUG /DDART_SHARED_LIB /DPy_LIMITED_API=0x030c0000 /I `"$includeDir`" /I src src\dart_bridge.c src\dart_api\dart_api_dl.c /link /LIBPATH:`"$libDir`" /OUT:dist\dart_bridge_d-windows-x86_64.dll `"$libDir\python3_d.lib`""
          cmd /c "`"$vcvars`" >NUL && $dbgCmd"

          Get-Item dist\*.dll | Format-List FullName, Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/*.dll
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Download python-android-mobile-forge headers + abi3 stub
        run: |
          set -euo pipefail
          curl -fL -o pamf.tar.gz \
            "https://github.com/flet-dev/python-build/releases/download/v3.12/python-android-mobile-forge-3.12.tar.gz"
          mkdir -p pydist
          tar -xzf pamf.tar.gz -C pydist --wildcards \
            "install/android/${{ matrix.abi }}/python-3.12.*/include/" \
            "install/android/${{ matrix.abi }}/python-3.12.*/lib/libpython3.so"
      - name: Cross-compile via NDK
        run: |
          set -euxo pipefail
          ABI=${{ matrix.abi }}
          case "$ABI" in
            arm64-v8a)   TARGET=aarch64-linux-android ;;
            armeabi-v7a) TARGET=armv7a-linux-androideabi ;;
            x86_64)      TARGET=x86_64-linux-android ;;
          esac
          NDK="${ANDROID_NDK_HOME:-${ANDROID_NDK_LATEST_HOME}}"
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET}21-clang"
          INCLUDE_DIR=$(find pydist -path "*/include/python3.*" -type d | head -n1)
          LIBPYTHON=$(find pydist -name libpython3.so | head -n1)
          mkdir -p dist
          OUT="dist/libdart_bridge-android-${ABI}.so"
          $CC -shared -fPIC -fvisibility=hidden \
            -DDART_SHARED_LIB \
            -DPy_LIMITED_API=0x030c0000 \
            -I "$INCLUDE_DIR" -I src \
            src/dart_bridge.c src/dart_api/dart_api_dl.c \
            "$LIBPYTHON" -ldl \
            -Wl,-z,max-page-size=16384 \
            -o "$OUT"
          file "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: dist/*.so
          if-no-files-found: error

  build-apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Python iOS dist (headers only)
        run: |
          curl -fL -o pyios.tar.gz "https://github.com/flet-dev/python-build/releases/download/v3.12/python-ios-dart-3.12.tar.gz"
          mkdir -p pyios && tar -xzf pyios.tar.gz -C pyios
          HEADER_DIR=$(find pyios -name Python.h -exec dirname {} \; | head -n1)
          echo "PYTHON_HEADERS_DIR=$HEADER_DIR" >> "$GITHUB_ENV"
      - run: ./apple/build_xcframework.sh
      - uses: actions/upload-artifact@v4
        with:
          name: apple-xcframework
          path: dist/dart_bridge-apple.xcframework.zip
          if-no-files-found: error

  publish:
    needs: [build-linux, build-windows, build-android, build-apple]
    runs-on: ubuntu-latest
    # Only attach to a real GitHub Release on tag pushes; workflow_dispatch
    # runs still build everything for verification but don't publish.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts into one dir
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.so' -o -name '*.dll' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -lh dist/
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/libdart_bridge-linux-x86_64.so
            dist/libdart_bridge-linux-aarch64.so
            dist/dart_bridge-windows-x86_64.dll
            dist/dart_bridge_d-windows-x86_64.dll
            dist/libdart_bridge-android-arm64-v8a.so
            dist/libdart_bridge-android-armeabi-v7a.so
            dist/libdart_bridge-android-x86_64.so
            dist/dart_bridge-apple.xcframework.zip
          fail_on_unmatched_files: true
